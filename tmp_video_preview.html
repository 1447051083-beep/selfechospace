<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #111;
      }
    </style>
  </head>
  <body>
    <video id="video" src="./tmp_reference_effect.mp4" muted playsinline></video>
    <script>
      const params = new URLSearchParams(location.search);
      const at = Number(params.get("t") || 0);
      const video = document.getElementById("video");
      video.addEventListener("loadedmetadata", () => {
        video.currentTime = Math.min(Math.max(at, 0), Math.max(video.duration - 0.01, 0));
      });
    </script>
  </body>
</html>
